services:

  api_cash_splice:
    build: .
    image: node:22-alpine
    container_name: api_cash_splice
    volumes:
      - "${VOLUME_FOLDER_BACK}:/usr/src/app" # Cambié service por app para que coincida con tu Dockerfile
      - /usr/src/app/node_modules            # <--- VOLUMEN ANÓNIMO: Protege los módulos de Linux
    working_dir: /usr/src/app
    ports:
      - 3000:3000
    restart: always
  
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cash_db
    ports:
      - 5432:5432
    volumes:
      - ./postgres_data:/var/lib/postgresql/data # Persistencia de datos
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql #ejecuta archivo para crear tablas